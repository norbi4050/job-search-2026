name: Build & Push Dashboard

on:
  push:
    branches: [feature/dashboard-profesional, master]
    paths:
      - 'consultorio-kit/dashboard/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: consultorio-kit/dashboard
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/consultorio-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/consultorio-dashboard:${{ github.sha }}
